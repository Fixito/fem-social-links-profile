<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png" />
    <title>Frontend Mentor | Social links profile</title>
    <link
      rel="preload"
      href="./assets/fonts/InterVariable.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link rel="stylesheet" href="./assets/styles/style.css" />
  </head>
  <body>
    <main>
      <article class="profile-card">
        <img
          src="./assets/images/avatar-jessica.webp"
          alt="Photo of Jessica Randall"
          width="88"
          height="88"
          fetchpriority="high"
          class="profile-card__img"
        />

        <div>
          <h1 class="text-preset-1">Jessica Randall</h1>
          <p class="profile-card__location text-preset-2-bold">London, United Kingdom</p>
        </div>

        <div class="profile-card__bio text-preset-2">
          <q>Front-end developer and avid reader.</q>
        </div>

        <ul class="profile-card__social-links-container text-preset-2-bold">
          <li>
            <a href="#" class="profile-card__social-link">GitHub</a>
          </li>

          <li>
            <a href="#" class="profile-card__social-link">Frontend Mentor</a>
          </li>

          <li>
            <a href="#" class="profile-card__social-link">LinkedIn</a>
          </li>

          <li>
            <a href="#" class="profile-card__social-link">Twitter</a>
          </li>

          <li>
            <a href="#" class="profile-card__social-link">Instagram</a>
          </li>
        </ul>
      </article>
    </main>
  </body>
</html>
